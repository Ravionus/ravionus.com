  # ── Job 12: Deploy to GitHub Pages ────────────────────────────────────────
  # Only runs on pushes to main.
  # Requires ALL test jobs to have PASSED or been SKIPPED.
  # On main, no jobs are skipped (all run as pre-deploy gate), so all must pass.
  deploy:
    name: Deploy
    needs: [test_learn, test_json, test_markdown, test_base64, test_url, test_csv, test_yaml, test_regex, test_formatter, test_hash, test_diff]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.test_learn.result    == 'success' || needs.test_learn.result    == 'skipped') &&
      (needs.test_json.result     == 'success' || needs.test_json.result     == 'skipped') &&
      (needs.test_markdown.result == 'success' || needs.test_markdown.result == 'skipped') &&
      (needs.test_base64.result   == 'success' || needs.test_base64.result   == 'skipped') &&
      (needs.test_url.result      == 'success' || needs.test_url.result      == 'skipped') &&
      (needs.test_csv.result      == 'success' || needs.test_csv.result      == 'skipped') &&
      (needs.test_yaml.result     == 'success' || needs.test_yaml.result     == 'skipped') &&
      (needs.test_regex.result    == 'success' || needs.test_regex.result    == 'skipped') &&
      (needs.test_formatter.result == 'success' || needs.test_formatter.result == 'skipped') &&
      (needs.test_hash.result      == 'success' || needs.test_hash.result      == 'skipped') &&
      (needs.test_diff.result      == 'success' || needs.test_diff.result      == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare site files
        run: |
          mkdir _site
          cp -r index.html CNAME learn tools playground _site/ 2>/dev/null || true
          [ -f README.md ] && cp README.md _site/ || true
          [ -f robots.txt ] && cp robots.txt _site/ || true
          [ -f sitemap.xml ] && cp sitemap.xml _site/ || true
          [ -f favicon.svg ] && cp favicon.svg _site/ || true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
