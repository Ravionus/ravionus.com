        run: npm install
        working-directory: tests

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run Syntax Highlighter tests
        run: npx playwright test syntax.spec.js
        working-directory: tests

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: syntax-report
          path: tests/playwright-report/
          retention-days: 7

  # ── Job 27: JavaScript REPL tests ─────────────────────────────────────────
  test_repl:
    name: "Test › JavaScript REPL"
    needs: changes
    if: >-
      needs.changes.outputs.repl == 'true' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        run: npm install
        working-directory: tests

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run JavaScript REPL tests
        run: npx playwright test repl.spec.js
        working-directory: tests

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: repl-report
          path: tests/playwright-report/
          retention-days: 7

  test_css_layout:
    name: "Test › CSS Layout Playground"
    needs: changes
    if: >-
      needs.changes.outputs.css_layout == 'true' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        run: npm install
        working-directory: tests

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run CSS Layout Playground tests
        run: npx playwright test css-layout.spec.js
        working-directory: tests

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: css-layout-report
          path: tests/playwright-report/
          retention-days: 7

  test_json_explorer:
    name: "Test › JSON Explorer"
    needs: changes
    if: >-
      needs.changes.outputs.json_explorer == 'true' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        run: npm install
        working-directory: tests

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run JSON Explorer tests
        run: npx playwright test json-explorer.spec.js
        working-directory: tests

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: json-explorer-report
          path: tests/playwright-report/
          retention-days: 7

  # ── Job 30: Deploy to GitHub Pages ────────────────────────────────────────
  # Only runs on pushes to main.
  # Requires ALL test jobs to have PASSED or been SKIPPED.
  # On main, no jobs are skipped (all run as pre-deploy gate), so all must pass.
  deploy:
    name: Deploy
    needs: [test_learn, test_json, test_markdown, test_base64, test_url, test_csv, test_yaml, test_regex, test_formatter, test_hash, test_diff, test_uuid, test_password, test_lorem, test_case, test_color, test_minifier, test_qr, test_syntax, test_repl, test_css_layout, test_json_explorer]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.test_learn.result    == 'success' || needs.test_learn.result    == 'skipped') &&
      (needs.test_json.result     == 'success' || needs.test_json.result     == 'skipped') &&
      (needs.test_markdown.result == 'success' || needs.test_markdown.result == 'skipped') &&
      (needs.test_base64.result   == 'success' || needs.test_base64.result   == 'skipped') &&
      (needs.test_url.result      == 'success' || needs.test_url.result      == 'skipped') &&
      (needs.test_csv.result      == 'success' || needs.test_csv.result      == 'skipped') &&
      (needs.test_yaml.result     == 'success' || needs.test_yaml.result     == 'skipped') &&
      (needs.test_regex.result    == 'success' || needs.test_regex.result    == 'skipped') &&
      (needs.test_formatter.result == 'success' || needs.test_formatter.result == 'skipped') &&
      (needs.test_hash.result      == 'success' || needs.test_hash.result      == 'skipped') &&
      (needs.test_diff.result      == 'success' || needs.test_diff.result      == 'skipped') &&
      (needs.test_uuid.result      == 'success' || needs.test_uuid.result      == 'skipped') &&
      (needs.test_password.result  == 'success' || needs.test_password.result  == 'skipped') &&
      (needs.test_lorem.result     == 'success' || needs.test_lorem.result     == 'skipped') &&
      (needs.test_case.result      == 'success' || needs.test_case.result      == 'skipped') &&
      (needs.test_color.result     == 'success' || needs.test_color.result     == 'skipped') &&
      (needs.test_minifier.result  == 'success' || needs.test_minifier.result  == 'skipped') &&
      (needs.test_qr.result        == 'success' || needs.test_qr.result        == 'skipped') &&
      (needs.test_syntax.result    == 'success' || needs.test_syntax.result    == 'skipped') &&
      (needs.test_repl.result       == 'success' || needs.test_repl.result       == 'skipped') &&
      (needs.test_css_layout.result    == 'success' || needs.test_css_layout.result    == 'skipped') &&
      (needs.test_json_explorer.result  == 'success' || needs.test_json_explorer.result  == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare site files
        run: |
          mkdir _site
          cp -r index.html CNAME learn tools playground _site/ 2>/dev/null || true
          [ -f README.md ] && cp README.md _site/ || true
          [ -f robots.txt ] && cp robots.txt _site/ || true
          [ -f sitemap.xml ] && cp sitemap.xml _site/ || true
          [ -f favicon.svg ] && cp favicon.svg _site/ || true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
