name: CI / CD

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**.md'
      - '.gitignore'
      - 'CNAME'
  pull_request:
    paths-ignore:
      - 'README.md'
      - '**.md'
      - '.gitignore'
      - 'CNAME'

# Permissions required by the GitHub Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time; don't cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

# ── Test tier strategy ────────────────────────────────────────────────────────
#
#  Tier            | When it runs                         | Job(s)
#  ---------------------------------------------------------------------------
#  Pre-deploy      | Every push to main, before deploy    | ALL three test jobs
#  Path-triggered  | When relevant source files change    | Only the affected job
#  Both            | Pre-deploy AND on relevant change    | (all tests in that job)
#
#  On push to main  → all three test jobs always run → gates deploy
#  On feature branch / PR:
#    learn/**                         → test_learn only
#    tools/json/**                    → test_json only
#    playground/markdown/**           → test_markdown only
#    Unchanged areas are skipped for faster CI feedback.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Job 0: Detect which source areas changed ──────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      learn:    ${{ steps.filter.outputs.learn }}
      json:     ${{ steps.filter.outputs.json }}
      markdown: ${{ steps.filter.outputs.markdown }}
      base64:   ${{ steps.filter.outputs.base64 }}
      url:       ${{ steps.filter.outputs.url }}
      csv:       ${{ steps.filter.outputs.csv }}
      yaml:      ${{ steps.filter.outputs.yaml }}
      regex:     ${{ steps.filter.outputs.regex }}
      formatter: ${{ steps.filter.outputs.formatter }}
      hash:      ${{ steps.filter.outputs.hash }}
      diff:      ${{ steps.filter.outputs.diff }}
      uuid:      ${{ steps.filter.outputs.uuid }}
      password:  ${{ steps.filter.outputs.password }}
      lorem:     ${{ steps.filter.outputs.lorem }}
      case:      ${{ steps.filter.outputs.case }}
      color:     ${{ steps.filter.outputs.color }}
      minifier:  ${{ steps.filter.outputs.minifier }}
      qr:        ${{ steps.filter.outputs.qr }}
      syntax:    ${{ steps.filter.outputs.syntax }}
      repl:      ${{ steps.filter.outputs.repl }}
      css_layout:    ${{ steps.filter.outputs.css_layout }}
      json_explorer: ${{ steps.filter.outputs.json_explorer }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            learn:
              - 'learn/**'
              - 'tests/catalog.spec.js'
              - 'tests/topic.spec.js'
            json:
              - 'tools/json/**'
              - 'tests/json.spec.js'
            markdown:
              - 'playground/markdown/**'
              - 'tests/markdown.spec.js'
            base64:
              - 'tools/base64/**'
              - 'tests/base64.spec.js'
            url:
              - 'tools/url/**'
              - 'tests/url.spec.js'
            csv:
              - 'tools/csv/**'
              - 'tests/csv.spec.js'
            yaml:
              - 'tools/yaml/**'
              - 'tests/yaml.spec.js'
            regex:
              - 'tools/regex/**'
              - 'tests/regex.spec.js'
            formatter:
              - 'tools/formatter/**'
              - 'tests/formatter.spec.js'
            hash:
              - 'tools/hash/**'
              - 'tests/hash.spec.js'
            diff:
              - 'tools/diff/**'
              - 'tests/diff.spec.js'
            uuid:
              - 'tools/uuid/**'
              - 'tests/uuid.spec.js'
            password:
              - 'tools/password/**'
              - 'tests/password.spec.js'
            lorem:
              - 'tools/lorem/**'
              - 'tests/lorem.spec.js'
            case:
              - 'tools/case/**'
              - 'tests/case.spec.js'
            color:
              - 'tools/color/**'
              - 'tests/color.spec.js'
            minifier:
              - 'tools/minifier/**'
              - 'tests/minifier.spec.js'
            qr:
              - 'tools/qr/**'
              - 'tests/qr.spec.js'
            syntax:
              - 'tools/syntax/**'
              - 'tests/syntax.spec.js'
            repl:
              - 'playground/repl/**'
              - 'tests/repl.spec.js'
            css_layout:
              - 'playground/css-layout/**'
              - 'tests/css-layout.spec.js'
            json_explorer:
              - 'playground/json-explorer/**'
              - 'tests/json-explorer.spec.js'

  # ── Job 1: Learn — catalog + topic tests ─────────────────────────────────
  # Runs when:  learn/** or its spec files change
  #             OR every push to main (pre-deploy gate)
  test_learn:
    name: "Test › Learn (catalog + topic)"
    needs: changes
    if: >-
      needs.changes.outputs.learn == 'true' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        run: npm install
        working-directory: tests

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run learn tests
        run: npx playwright test catalog.spec.js topic.spec.js
        working-directory: tests

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: learn-report
          path: tests/playwright-report/
          retention-days: 7

