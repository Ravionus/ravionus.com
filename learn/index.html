<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://cdnjs.cloudflare.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' https: data:; connect-src 'self' https://*.googleapis.com https://*.cloudfunctions.net wss://*.firebaseio.com https://*.gstatic.com https://cdnjs.cloudflare.com; frame-src https://accounts.google.com https://ravionus-f5574.firebaseapp.com;">
  <title>Learn — Ravionus</title>
  <meta name="description"
    content="Interactive bite-sized learning on Git, JavaScript, and more — with quizzes built right in. Start learning for free on Ravionus.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        Ravionus
        <span class="logo-badge">Learn</span>
      </a>
      <!-- Auth UI (populated by firebase.js) -->
      <div class="nav-auth" id="navAuth">
        <button class="btn-signin" id="signInBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Sign in
        </button>
        <div class="user-chip hidden" id="userChip">
          <img class="user-avatar" id="userAvatar" src="" alt="avatar">
          <span class="user-name" id="userName"></span>
          <button class="btn-signout" id="signOutBtn">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-eyebrow">
      <span>✨</span> Interactive Courses
    </div>
    <h1>
      Learn things that<br>
      <span class="gradient-text">actually matter</span>
    </h1>
    <p class="hero-sub">
      Bite-sized lessons paired with instant quizzes — so you don't just read, you <em>understand</em>.
    </p>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-value" id="statTopics">—</div>
        <div class="stat-label">Topics</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statLessons">—</div>
        <div class="stat-label">Lessons</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statQuizzes">—</div>
        <div class="stat-label">Quizzes</div>
      </div>
    </div>
  </section>

  <!-- Search -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Search topics, tags…"
        aria-label="Search topics" autocomplete="off">
    </div>
  </div>

  <!-- Topic Grid -->
  <section class="topics-section">
    <div class="section-header">
      <span class="section-title">All Topics</span>
    </div>
    <div class="topics-grid" id="topicsGrid">
      <!-- Rendered by app.js -->
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Made with ❤️ by <a href="/">Ravionus</a></p>
  </footer>

  <!-- jsPDF (for certificates) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
          integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
  <script src="content.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
