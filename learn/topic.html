<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' https: data:; connect-src 'self' https://*.googleapis.com https://*.cloudfunctions.net wss://*.firebaseio.com;">
    <title>Topic — Ravionus Learn</title>
    <meta name="description" content="Start learning with Ravionus — interactive lessons with built-in quizzes.">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">
                Ravionus
                <span class="logo-badge">Learn</span>
            </a>
            <a href="./" class="nav-back">
                ← All Topics
            </a>
            <!-- Auth UI (populated by firebase.js) -->
            <div class="nav-auth" id="navAuth">
                <button class="btn-signin" id="signInBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Sign in
                </button>
                <div class="user-chip hidden" id="userChip">
                    <img class="user-avatar" id="userAvatar" src="" alt="avatar">
                    <span class="user-name" id="userName"></span>
                    <button class="btn-signout" id="signOutBtn">Sign out</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Topic Hero -->
    <div class="topic-hero">
        <div class="topic-hero-inner">
            <div class="topic-meta">
                <span class="topic-icon-lg" id="topicIcon"></span>
                <span class="badge" id="topicDiff"></span>
                <span class="badge badge-time" id="topicTime"></span>
            </div>
            <h1 class="topic-title" id="topicTitleEl"></h1>
            <p class="topic-desc-hero" id="topicDescEl"></p>
        </div>
    </div>

    <!-- Reader Layout -->
    <div class="reader-layout">

        <!-- Sidebar: Section Progress -->
        <aside class="progress-sidebar" id="progressSidebar">
            <div class="sidebar-title">Progress</div>
            <div class="section-steps" id="sectionSteps">
                <!-- Rendered by app.js -->
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area" id="contentArea">
            <!-- Rendered by app.js -->
        </main>

    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <p>Made with ❤️ by <a href="/">Ravionus</a></p>
    </footer>

    <!-- jsPDF (for certificates) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="content.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
