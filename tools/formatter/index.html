<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Formatter — Ravionus Dev Tools</title>
    <meta name="description" content="Format JavaScript, HTML, CSS, and JSON with one click. 100% client-side — your code never leaves your browser.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none';">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- CDN: js-beautify (browser-ready builds) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify.min.js"
            integrity="sha512-kElKX79OYM/vf2AU+lF4Zsi3AnKds70Mc6fRBImpwQzdZNbju6SyeTBBOUe1N9q1P456v1F01HAsjjWZkXIS4Q==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-css.min.js"
            integrity="sha512-GS3bO88bff1ieJ8ZKeWhjlK5Y6Mwvu4WmQ8gdIgbeSyp7iBaqSVxCUGgOV9RjiiQgoci/HW9n7IVn3o670AY8w==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-html.min.js"
            integrity="sha512-9oipLBY8N19ej4XlfPFHfdKkqn8FnAEsucbkycMoLthN77bImVWZ0GtLMfCrXBqpTetBn2eM9N1pliZJC7IrNA==" crossorigin="anonymous"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #0e0e16;
            --border: #1e1e2e;
            --border2: #2a2a3e;
            --text: #e2e2f0;
            --muted: #7878a0;
            --purple: #a855f7;
            --cyan: #22d3ee;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --orange: #f97316;
            --accent-g: linear-gradient(135deg, #a855f7, #22d3ee);
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ── Nav ── */
        nav {
            border-bottom: 1px solid var(--border);
            background: rgba(10,10,15,.95);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
        }
        .nav-inner {
            padding: 0 20px; height: 52px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .nav-logo {
            font-size: 1.1rem; font-weight: 800; text-decoration: none;
            background: var(--accent-g); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; letter-spacing: -.5px; flex-shrink: 0;
        }
        .nav-sep { color: var(--border2); flex-shrink: 0; }
        .nav-breadcrumb { font-size: .82rem; color: var(--muted); }
        .nav-breadcrumb a { color: var(--muted); text-decoration: none; }
        .nav-breadcrumb a:hover { color: var(--text); }
        .nav-breadcrumb .current { color: var(--text); font-weight: 600; }
        .nav-links { display: flex; gap: 4px; flex-shrink: 0; }
        .nav-link {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 10px; border-radius: 7px; font-size: .8rem; font-weight: 500;
            text-decoration: none; color: var(--muted);
            transition: color .15s, background .15s; white-space: nowrap;
        }
        .nav-link:hover { color: var(--text); background: var(--surface); }

        /* ── Toolbar ── */
        .toolbar {
            border-bottom: 1px solid var(--border); background: var(--surface);
            padding: 6px 14px; display: flex; align-items: center;
            gap: 5px; flex-shrink: 0; flex-wrap: wrap;
        }
        .tb-group { display: flex; align-items: center; gap: 3px; }
        .tb-sep { width: 1px; height: 20px; background: var(--border2); margin: 0 4px; }
        .tb-label { font-size: .72rem; font-weight: 600; color: var(--muted); margin-right: 3px; white-space: nowrap; }
        .tb-btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 5px; height: 28px; padding: 0 10px;
            border-radius: 6px; border: none;
            background: transparent; color: var(--muted);
            font-size: .78rem; font-weight: 600; cursor: pointer;
            transition: color .12s, background .12s;
            font-family: inherit; white-space: nowrap;
        }
        .tb-btn:hover { color: var(--text); background: var(--border); }
        .tb-btn.primary { background: rgba(168,85,247,.15); color: var(--purple); border: 1px solid rgba(168,85,247,.3); }
        .tb-btn.primary:hover { background: rgba(168,85,247,.25); color: #c084fc; }
        .tb-btn.active { background: rgba(34,211,238,.12); color: var(--cyan); border: 1px solid rgba(34,211,238,.3); }
        .tb-btn.active:hover { background: rgba(34,211,238,.22); }
        .tb-btn.danger:hover { color: var(--red); background: rgba(239,68,68,.1); }
        /* Language buttons: monospace, smaller */
        .tb-btn.lang {
            font-family: var(--font-mono); font-size: .8rem;
            padding: 0 9px; min-width: 40px;
            border: 1px solid transparent;
        }
        .tb-btn.lang.active {
            background: rgba(168,85,247,.12); color: var(--purple);
            border-color: rgba(168,85,247,.3);
        }
        .tb-btn.lang.active:hover { background: rgba(168,85,247,.22); }
        .tb-right { margin-left: auto; display: flex; align-items: center; gap: 5px; }

        /* ── Options bar ── */
        .options-bar {
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            padding: 5px 14px;
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; flex-wrap: wrap;
        }
        .opt-group { display: flex; align-items: center; gap: 4px; }
        .opt-label { font-size: .7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
        .opt-btn {
            height: 22px; padding: 0 8px; border-radius: 5px; border: 1px solid transparent;
            background: transparent; color: var(--muted); font-size: .72rem;
            font-weight: 600; cursor: pointer; font-family: var(--font-mono);
            transition: color .12s, background .12s;
        }
        .opt-btn:hover { color: var(--text); background: var(--border); }
        .opt-btn.active { background: rgba(234,179,8,.1); color: var(--yellow); border-color: rgba(234,179,8,.3); }
        .opt-sep { width: 1px; height: 18px; background: var(--border2); }

        /* ── Banners ── */
        .error-banner {
            background: rgba(239,68,68,.1); border-bottom: 1px solid rgba(239,68,68,.25);
            color: var(--red); padding: 6px 18px; font-size: .8rem;
            display: none; flex-shrink: 0; word-break: break-word;
        }
        .error-banner.visible { display: block; }
        .success-banner {
            background: rgba(34,197,94,.08); border-bottom: 1px solid rgba(34,197,94,.2);
            color: var(--green); padding: 5px 18px; font-size: .78rem;
            display: none; flex-shrink: 0; align-items: center; gap: 6px;
        }
        .success-banner.visible { display: flex; }
        .info-banner {
            background: rgba(120,120,160,.08); border-bottom: 1px solid rgba(120,120,160,.15);
            color: var(--muted); padding: 5px 18px; font-size: .78rem;
            display: none; flex-shrink: 0; align-items: center;
        }
        .info-banner.visible { display: flex; }

        /* ── Layout ── */
        .editor-layout { flex: 1; display: flex; overflow: hidden; min-height: 0; }
        .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        .pane-header {
            padding: 5px 16px; background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            font-size: .7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .08em; color: var(--muted); flex-shrink: 0;
        }
        .pane-header-actions { display: flex; gap: 4px; }
        .ph-btn {
            height: 20px; padding: 0 7px; border-radius: 4px; border: none;
            background: transparent; color: var(--muted);
            font-size: .68rem; font-weight: 600; cursor: pointer;
            transition: color .12s, background .12s; font-family: inherit;
        }
        .ph-btn:hover { color: var(--text); background: var(--border); }
        .pane-divider { width: 1px; background: var(--border); flex-shrink: 0; }
        .editor-wrap { flex: 1; overflow: hidden; position: relative; }

        textarea {
            width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            border: none; outline: none; resize: none;
            padding: 18px 20px;
            font-family: var(--font-mono); font-size: .85rem; line-height: 1.7;
            tab-size: 2; overflow-y: auto;
        }
        textarea[readonly] { background: var(--surface2); color: #c8c8e0; cursor: text; }
        textarea::selection { background: rgba(168,85,247,.22); }

        /* Status bar */
        .status-bar {
            border-top: 1px solid var(--border); background: var(--surface2);
            padding: 4px 18px; display: flex; align-items: center;
            gap: 18px; flex-wrap: wrap; font-size: .72rem; color: var(--muted); flex-shrink: 0;
        }
        .stat-item { display: flex; align-items: center; gap: 4px; }
        .stat-val { color: var(--text); font-weight: 600; }
        .stat-val.ok  { color: var(--green); }
        .stat-val.err { color: var(--red); }

        /* Toast */
        #toast {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--surface); border: 1px solid var(--border2);
            border-radius: 9px; padding: 9px 16px;
            font-size: .82rem; color: var(--text);
            box-shadow: 0 4px 24px rgba(0,0,0,.5);
            transform: translateY(50px); opacity: 0;
            transition: transform .22s ease, opacity .22s ease;
            pointer-events: none; z-index: 500;
        }
        #toast.show { transform: translateY(0); opacity: 1; }

        /* Mobile tabs */
        .mobile-tabs {
            display: none; flex-shrink: 0;
            border-bottom: 1px solid var(--border); background: var(--surface);
        }
        .mob-tab {
            flex: 1; padding: 9px; border: none; background: transparent;
            color: var(--muted); font-size: .85rem; font-weight: 600;
            cursor: pointer; border-bottom: 2px solid transparent;
            transition: color .15s, border-color .15s; font-family: inherit;
        }
        .mob-tab.active { color: var(--purple); border-bottom-color: var(--purple); }

        /* Focus indicators for keyboard navigation */
        .tb-btn:focus-visible, .opt-btn:focus-visible, .ph-btn:focus-visible, .mob-tab:focus-visible {
            outline: 2px solid var(--cyan);
            outline-offset: 2px;
        }

        @media (max-width: 700px) {
            .mobile-tabs { display: flex; }
            .pane-header { display: none; }
            .pane-divider { display: none; }
            .pane { display: none; }
            .pane.mob-visible { display: flex; }
            .nav-links { display: none; }
            .tb-right { margin-left: 0; }
        }
    </style>
</head>
<body>

<!-- Nav -->
<nav>
    <div class="nav-inner">
        <div class="nav-left">
            <a href="/" class="nav-logo">Ravionus</a>
            <span class="nav-sep">/</span>
            <span class="nav-breadcrumb">
                <a href="../">Dev Tools</a> / <span class="current">Code Formatter</span>
            </span>
        </div>
        <div class="nav-links">
            <a href="../../learn/" class="nav-link">✨ Learn</a>
            <a href="../../tools/" class="nav-link">🛠️ Tools</a>
            <a href="../../playground/" class="nav-link">🧪 Playgrounds</a>
        </div>
    </div>
</nav>

<!-- Toolbar -->
<div class="toolbar">
    <div class="tb-group">
        <button class="tb-btn primary" id="btnFormat">⚡ Format</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group" id="langGroup">
        <span class="tb-label">Language:</span>
        <button class="tb-btn lang active" data-lang="js">JS</button>
        <button class="tb-btn lang" data-lang="html">HTML</button>
        <button class="tb-btn lang" data-lang="css">CSS</button>
        <button class="tb-btn lang" data-lang="json">JSON</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group">
        <button class="tb-btn" id="btnSample">📋 Sample</button>
    </div>
    <div class="tb-right">
        <button class="tb-btn" id="btnDownload">⬇ Download</button>
        <button class="tb-btn" id="btnCopy">📄 Copy</button>
        <button class="tb-btn danger" id="btnClear">✕ Clear</button>
    </div>
</div>

<!-- Options bar -->
<div class="options-bar">
    <div class="opt-group">
        <span class="opt-label">Indent:</span>
        <button class="opt-btn active" data-indent="2">2</button>
        <button class="opt-btn" data-indent="4">4</button>
        <button class="opt-btn" data-indent="tab">⇥ Tab</button>
    </div>
    <div class="opt-sep"></div>
    <div class="opt-group" id="braceGroup">
        <span class="opt-label">Braces:</span>
        <button class="opt-btn active" data-brace="collapse">Collapse</button>
        <button class="opt-btn" data-brace="expand">Expand</button>
    </div>
</div>

<!-- Banners -->
<div class="error-banner"   id="errorBanner"   role="alert"></div>
<div class="success-banner" id="successBanner" aria-live="polite"></div>
<div class="info-banner"    id="infoBanner"    aria-live="polite"></div>

<!-- Mobile tabs -->
<div class="mobile-tabs">
    <button class="mob-tab active" id="tabInput">📥 Source</button>
    <button class="mob-tab" id="tabOutput">✨ Formatted</button>
</div>

<!-- Editor layout -->
<div class="editor-layout">

    <!-- Left: source input -->
    <div class="pane mob-visible" id="paneInput">
        <div class="pane-header">
            <span id="inputLabel">JavaScript Source</span>
            <div class="pane-header-actions">
                <button class="ph-btn" id="btnPaste">Paste</button>
                <button class="ph-btn" id="btnCopyInput">Copy</button>
            </div>
        </div>
        <div class="editor-wrap">
            <textarea id="inputArea" spellcheck="false" autocomplete="off" aria-label="Source code input"
                placeholder="Paste your JavaScript code here and click ⚡ Format…&#10;&#10;Or click 📋 Sample for an example."></textarea>
        </div>
    </div>

    <div class="pane-divider"></div>

    <!-- Right: formatted output -->
    <div class="pane" id="paneOutput">
        <div class="pane-header">
            <span>Formatted Output</span>
            <div class="pane-header-actions">
                <button class="ph-btn" id="btnCopyOutput">Copy</button>
            </div>
        </div>
        <div class="editor-wrap">
            <textarea id="outputArea" readonly spellcheck="false" aria-label="Formatted code output"
                placeholder="Formatted code will appear here…"></textarea>
        </div>
    </div>

</div>

<!-- Status bar -->
<div class="status-bar">
    <span class="stat-item">Language: <span id="statLang"   class="stat-val">JavaScript</span></span>
    <span class="stat-item">Input:    <span id="statInput"  class="stat-val">—</span></span>
    <span class="stat-item">Output:   <span id="statOutput" class="stat-val">—</span></span>
    <span class="stat-item">Status:   <span id="statStatus" class="stat-val">Ready</span></span>
</div>

<div id="toast" aria-live="polite"></div>

<script>
'use strict';

const STORAGE_KEY = 'ravionus_tool_formatter';

const LANG_NAMES = { js: 'JavaScript', html: 'HTML', css: 'CSS', json: 'JSON' };
const LANG_EXTS  = { js: 'js', html: 'html', css: 'css', json: 'json' };
const PLACEHOLDERS = {
    js:   'Paste your JavaScript code here and click ⚡ Format…\n\nOr click 📋 Sample for an example.',
    html: 'Paste your HTML code here and click ⚡ Format…\n\nOr click 📋 Sample for an example.',
    css:  'Paste your CSS code here and click ⚡ Format…\n\nOr click 📋 Sample for an example.',
    json: 'Paste your JSON here and click ⚡ Format…\n\nOr click 📋 Sample for an example.'
};

const SAMPLES = {
    js: `function factorial(n){if(n===0||n===1){return 1;}const result=n*factorial(n-1);return result;}class Calculator{constructor(){this.history=[];}add(a,b){const result=a+b;this.history.push({op:'add',a,b,result});return result;}subtract(a,b){const result=a-b;this.history.push({op:'sub',a,b,result});return result;}getHistory(){return this.history;}}`,
    html: `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>My Page</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><header class="site-header"><nav><ul><li><a href="/">Home</a></li><li><a href="/about">About</a></li><li><a href="/contact">Contact</a></li></ul></nav></header><main><h1>Welcome</h1><p>This is a <strong>sample</strong> HTML page with various <em>elements</em>.</p></main></div></body></html>`,
    css: `body{margin:0;padding:0;font-family:'Inter',sans-serif;background:#f9fafb;color:#111827}.container{max-width:1200px;margin:0 auto;padding:0 20px}.header{background:#1f2937;color:#f9fafb;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}.nav-link{color:#9ca3af;text-decoration:none;font-size:.9rem;padding:4px 8px;border-radius:4px;transition:color .2s,background .2s}.nav-link:hover{color:#f9fafb;background:rgba(255,255,255,.1)}@media(max-width:768px){.header{flex-direction:column;gap:12px;padding:12px 16px}}`,
    json: `{"project":"ravionus","version":"2.0.0","description":"Developer tools and learning platform","author":{"name":"Ravi Prasad","email":"ravi@ravionus.com","url":"https://ravionus.com"},"keywords":["developer","tools","learning","web"],"config":{"port":3000,"debug":false,"features":{"auth":true,"analytics":false,"cache":true}},"dependencies":{"playwright":"^1.42.0"}}`
};

// DOM refs
const inputArea     = document.getElementById('inputArea');
const outputArea    = document.getElementById('outputArea');
const errorBanner   = document.getElementById('errorBanner');
const successBanner = document.getElementById('successBanner');
const infoBanner    = document.getElementById('infoBanner');
const toast         = document.getElementById('toast');
const inputLabel    = document.getElementById('inputLabel');
const braceGroup    = document.getElementById('braceGroup');
const paneInput     = document.getElementById('paneInput');
const paneOutput    = document.getElementById('paneOutput');

// State
let currentLang = 'js';
let indentSize  = 2;
let useTabs     = false;
let braceStyle  = 'collapse';

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Banners ────────────────────────────────────────────────
function showError(msg) {
    errorBanner.textContent = '⚠ ' + msg;
    errorBanner.classList.add('visible');
    successBanner.classList.remove('visible');
    infoBanner.classList.remove('visible');
}
function showSuccess(msg) {
    successBanner.textContent = '✓ ' + msg;
    successBanner.classList.add('visible');
    errorBanner.classList.remove('visible');
    infoBanner.classList.remove('visible');
}
function showInfo(msg) {
    infoBanner.textContent = 'ℹ ' + msg;
    infoBanner.classList.add('visible');
    successBanner.classList.remove('visible');
    errorBanner.classList.remove('visible');
}
function clearBanners() {
    errorBanner.classList.remove('visible');
    successBanner.classList.remove('visible');
    infoBanner.classList.remove('visible');
}

// ── Language ───────────────────────────────────────────────
function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.tb-btn.lang').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    // Brace style only meaningful for JS
    braceGroup.style.display = lang === 'js' ? 'flex' : 'none';
    inputLabel.textContent = LANG_NAMES[lang] + ' Source';
    inputArea.placeholder  = PLACEHOLDERS[lang];
    document.getElementById('statLang').textContent = LANG_NAMES[lang];
    scheduleSave();
}

// ── Options ────────────────────────────────────────────────
document.querySelectorAll('[data-indent]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('[data-indent]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (btn.dataset.indent === 'tab') {
            useTabs = true;
        } else {
            useTabs = false;
            indentSize = parseInt(btn.dataset.indent);
        }
        scheduleSave();
    });
});

document.querySelectorAll('[data-brace]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('[data-brace]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        braceStyle = btn.dataset.brace;
        scheduleSave();
    });
});

// ── Format ─────────────────────────────────────────────────
function runFormat() {
    clearBanners();
    const code = inputArea.value;

    if (!code.trim()) {
        showInfo('Paste or type source code in the left pane, then click ⚡ Format.');
        return;
    }

    const baseOpts = {
        indent_size: indentSize,
        indent_with_tabs: useTabs,
        end_with_newline: true,
        preserve_newlines: true,
        max_preserve_newlines: 2
    };

    try {
        let result;

        if (currentLang === 'json') {
            const parsed = JSON.parse(code);
            result = JSON.stringify(parsed, null, useTabs ? '\t' : indentSize);
        } else if (currentLang === 'js') {
            if (typeof js_beautify !== 'function') {
                throw new Error('js-beautify CDN script failed to load. Check your connection and reload.');
            }
            result = js_beautify(code, {
                ...baseOpts,
                brace_style: braceStyle,
                jslint_happy: false,
                space_before_conditional: true
            });
        } else if (currentLang === 'css') {
            if (typeof css_beautify !== 'function') {
                throw new Error('js-beautify CDN script failed to load. Check your connection and reload.');
            }
            result = css_beautify(code, baseOpts);
        } else if (currentLang === 'html') {
            if (typeof html_beautify !== 'function') {
                throw new Error('js-beautify CDN script failed to load. Check your connection and reload.');
            }
            result = html_beautify(code, {
                ...baseOpts,
                indent_inner_html: true,
                wrap_line_length: 120,
                extra_liners: [],
                content_unformatted: ['pre', 'textarea'],
                unformatted: []
            });
        }

        outputArea.value = result;
        const outLines = result.split('\n').length;
        const inLines  = code.split('\n').length;
        document.getElementById('statInput').textContent  = inLines + ' line' + (inLines !== 1 ? 's' : '');
        document.getElementById('statOutput').textContent = outLines + ' line' + (outLines !== 1 ? 's' : '');
        const statEl = document.getElementById('statStatus');
        statEl.textContent = 'Formatted';
        statEl.className = 'stat-val ok';
        showSuccess(LANG_NAMES[currentLang] + ' formatted — ' + outLines + ' line' + (outLines !== 1 ? 's' : ''));
        scheduleSave();

    } catch (err) {
        outputArea.value = '';
        showError(err.message);
        const statEl = document.getElementById('statStatus');
        statEl.textContent = 'Error';
        statEl.className = 'stat-val err';
    }
}

// ── Sample ─────────────────────────────────────────────────
document.getElementById('btnSample').addEventListener('click', () => {
    inputArea.value  = SAMPLES[currentLang];
    outputArea.value = '';
    clearBanners();
    resetStatus();
    scheduleSave();
});

function resetStatus() {
    const inLines = inputArea.value ? inputArea.value.split('\n').length : 0;
    document.getElementById('statInput').textContent  = inLines ? inLines + ' line' + (inLines !== 1 ? 's' : '') : '—';
    document.getElementById('statOutput').textContent = '—';
    const stat = document.getElementById('statStatus');
    stat.textContent = 'Ready';
    stat.className = 'stat-val';
}

// ── Actions ────────────────────────────────────────────────
document.getElementById('btnFormat').addEventListener('click', runFormat);

document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runFormat(); }
});

document.getElementById('langGroup').addEventListener('click', e => {
    const btn = e.target.closest('[data-lang]');
    if (btn) { clearBanners(); setLang(btn.dataset.lang); }
});

document.getElementById('btnClear').addEventListener('click', () => {
    if (!inputArea.value && !outputArea.value) return;
    if (!confirm('Clear source and output?')) return;
    inputArea.value  = '';
    outputArea.value = '';
    clearBanners();
    resetStatus();
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    showToast('✓ Cleared');
});

document.getElementById('btnDownload').addEventListener('click', () => {
    if (!outputArea.value) { showToast('⚠️ Nothing to download — format first'); return; }
    const ext  = LANG_EXTS[currentLang];
    const blob = new Blob([outputArea.value], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href = url; a.download = 'formatted.' + ext;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('✓ Downloaded formatted.' + ext);
});

document.getElementById('btnCopy').addEventListener('click', async () => {
    if (!outputArea.value) { showToast('⚠️ Nothing to copy — format first'); return; }
    try { await navigator.clipboard.writeText(outputArea.value); showToast('✓ Output copied'); }
    catch { showToast('⚠️ Copy failed — use Ctrl+A, Ctrl+C'); }
});
document.getElementById('btnCopyInput').addEventListener('click', async () => {
    if (!inputArea.value) { showToast('⚠️ Input is empty'); return; }
    try { await navigator.clipboard.writeText(inputArea.value); showToast('✓ Input copied'); }
    catch { showToast('⚠️ Copy failed'); }
});
document.getElementById('btnCopyOutput').addEventListener('click', async () => {
    if (!outputArea.value) { showToast('⚠️ Nothing to copy — format first'); return; }
    try { await navigator.clipboard.writeText(outputArea.value); showToast('✓ Output copied'); }
    catch { showToast('⚠️ Copy failed'); }
});
document.getElementById('btnPaste').addEventListener('click', async () => {
    try {
        const text = await navigator.clipboard.readText();
        inputArea.value = text;
        clearBanners();
        scheduleSave();
    } catch { showToast('⚠️ Paste denied — use Ctrl+V'); }
});

// Mobile tabs
document.getElementById('tabInput').addEventListener('click', function() {
    paneInput.classList.add('mob-visible');
    paneOutput.classList.remove('mob-visible');
    document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
});
document.getElementById('tabOutput').addEventListener('click', function() {
    paneOutput.classList.add('mob-visible');
    paneInput.classList.remove('mob-visible');
    document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
});

inputArea.addEventListener('input', scheduleSave);

// ── Auto-save ──────────────────────────────────────────────
let saveTimer;
function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                lang: currentLang,
                input: inputArea.value,
                indentSize, useTabs, braceStyle
            }));
        } catch {}
    }, 600);
}

// ── Boot ──────────────────────────────────────────────────
(function init() {
    // Check CDN availability and signal readiness
    const cdnOK = typeof js_beautify === 'function' &&
                  typeof css_beautify === 'function' &&
                  typeof html_beautify === 'function';

    if (!cdnOK) {
        showError('js-beautify CDN scripts failed to load. JSON formatting still works. Reload to try again.');
    }
    // Always set data-ready so tests can proceed
    document.body.setAttribute('data-ready', 'true');

    // Restore saved state
    let saved = null;
    try { const r = localStorage.getItem(STORAGE_KEY); if (r) saved = JSON.parse(r); } catch {}

    if (saved) {
        if (saved.lang) setLang(saved.lang); else setLang('js');
        if (saved.input) inputArea.value = saved.input;
        if (saved.indentSize) {
            indentSize = saved.indentSize;
            document.querySelectorAll('[data-indent]').forEach(b => {
                b.classList.toggle('active',
                    saved.useTabs ? b.dataset.indent === 'tab'
                                  : String(saved.indentSize) === b.dataset.indent);
            });
        }
        if (saved.useTabs !== undefined) useTabs = saved.useTabs;
        if (saved.braceStyle) {
            braceStyle = saved.braceStyle;
            document.querySelectorAll('[data-brace]').forEach(b => {
                b.classList.toggle('active', b.dataset.brace === braceStyle);
            });
        }
        if (saved.input) resetStatus();
    } else {
        setLang('js');
    }
})();
</script>
